<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shayan Grade 8 Math Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Shayan Grade 8 Math Quiz</h1>
    <p>Online quiz with automatic grading and email result support.</p>
  </header>

  <main>
    <section class="panel">
      <label for="studentName">Student name</label>
      <input id="studentName" type="text" value="Shayan" />
      <div class="buttons">
        <button onclick="location.reload()">Restart Quiz</button>
        <a class="button secondary" href="test-email.html" target="_blank">Test Email</a>
      </div>
      <p class="note">First use <b>Test Email</b>. After your Web3Forms key is saved in config.js, quiz results will email automatically.</p>
    </section>

    <form id="quizForm" class="panel" onsubmit="gradeQuiz(event)">
      <div id="quizContainer">Loading questions...</div>
      <div class="buttons">
        <button type="submit">Submit Quiz</button>
        <button type="button" class="secondary" onclick="showAnswers()">Show Answers</button>
      </div>
      <div id="resultBox" class="result"></div>
    </form>
  </main>

  <footer>Shayan quiz project</footer>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
